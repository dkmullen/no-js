<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./styles/main.css" rel="stylesheet"></link>
    <title>Vanila Everything</title>
</head>
<body>
    <div id="page-container">
    <header><nav id="nav-include" class="nav-top"></nav></header>
        <main class="container">
            <h1>👋 Hi, Universe!</h1>
            <div class="light">
                This section uses the light theme.
            </div>
            <div>
                <input type="datetime-local" required />
            </div>
            <input
                type="text"
                name="city"
                autocomplete="address-level2"
            />
            <details>
            <summary>Details</summary>
            Something small enough to escape casual notice.
            </details>

            <button command="show-modal" commandfor="my-dialog">Open dialog</button>

            <dialog id="my-dialog">
            <p>This dialog was opened using an invoker command.</p>
            <button commandfor="my-dialog" command="close">Close</button>
            </dialog>
        </main>  
    </div>
    <script type="text/javascript" src="./js/global.js" defer></script>
</body>
</html>
